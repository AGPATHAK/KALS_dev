<script>

/* ================= LETTER DATA ================= */

const LETTERS = [
{kn:"ಅ",dev:"अ",group:"vowel"},
{kn:"ಆ",dev:"आ",group:"vowel"},
{kn:"ಇ",dev:"इ",group:"vowel"},
{kn:"ಈ",dev:"ई",group:"vowel"},
{kn:"ಉ",dev:"उ",group:"vowel"},
{kn:"ಊ",dev:"ऊ",group:"vowel"},
{kn:"ಎ",dev:"ए (ह्रस्व)",group:"vowel"},
{kn:"ಏ",dev:"ए (दीर्घ)",group:"vowel"},
{kn:"ಐ",dev:"ऐ",group:"vowel"},
{kn:"ಒ",dev:"ओ (ह्रस्व)",group:"vowel"},
{kn:"ಓ",dev:"ओ (दीर्घ)",group:"vowel"},
{kn:"ಔ",dev:"औ",group:"vowel"},
{kn:"ಅಂ",dev:"अं",group:"vowel"},
{kn:"ಅಃ",dev:"अः",group:"vowel"},
{kn:"ಋ",dev:"ऋ",group:"vowel"},

{kn:"ಕ",dev:"क",group:"velar"},
{kn:"ಖ",dev:"ख",group:"velar"},
{kn:"ಗ",dev:"ग",group:"velar"},
{kn:"ಘ",dev:"घ",group:"velar"},

{kn:"ಚ",dev:"च",group:"palatal"},
{kn:"ಛ",dev:"छ",group:"palatal"},
{kn:"ಜ",dev:"ज",group:"palatal"},
{kn:"ಝ",dev:"झ",group:"palatal"},

{kn:"ಟ",dev:"ट",group:"retroflex"},
{kn:"ಠ",dev:"ठ",group:"retroflex"},
{kn:"ಡ",dev:"ड",group:"retroflex"},
{kn:"ಢ",dev:"ढ",group:"retroflex"},

{kn:"ತ",dev:"त",group:"dental"},
{kn:"ಥ",dev:"थ",group:"dental"},
{kn:"ದ",dev:"द",group:"dental"},
{kn:"ಧ",dev:"ध",group:"dental"},

{kn:"ಪ",dev:"प",group:"labial"},
{kn:"ಫ",dev:"फ",group:"labial"},
{kn:"ಬ",dev:"ब",group:"labial"},
{kn:"ಭ",dev:"भ",group:"labial"},

{kn:"ಮ",dev:"म",group:"nasal"},
{kn:"ನ",dev:"न",group:"nasal"},
{kn:"ಣ",dev:"ण",group:"nasal"},
{kn:"ಲ",dev:"ल",group:"liquid"},
{kn:"ರ",dev:"र",group:"liquid"},
{kn:"ಯ",dev:"य",group:"semi"},
{kn:"ವ",dev:"व",group:"semi"},
{kn:"ಶ",dev:"श",group:"sibilant"},
{kn:"ಷ",dev:"ष",group:"sibilant"},
{kn:"ಸ",dev:"स",group:"sibilant"},
{kn:"ಹ",dev:"ह",group:"aspirate"},
{kn:"ಳ",dev:"ळ",group:"liquid"},
{kn:"ಕ್ಷ",dev:"क्ष",group:"consonant"}
].map((letter, idx) => ({
  ...letter,
  id: `L${String(idx + 1).padStart(3, '0')}`
}));

const STORAGE_KEY="kannada_alphabet_progress_v1";
const LATEST_HANDOFF_KEY="kals_latest_recommendation_handoff";
const PENDING_HANDOFF_KEY="kals_pending_recommendation_handoff";

/* ================= STORAGE ================= */

function loadProgress(){
const data=localStorage.getItem(STORAGE_KEY);
if(!data){
return{
sessions:[],
totalSessions:0,
totalCorrect:0,
totalAttempts:0,
currentStreak:0,
bestStreak:0,
letterStats:{}
};
}
return JSON.parse(data);
}

function saveProgress(p){
localStorage.setItem(STORAGE_KEY,JSON.stringify(p));
}

/* ================= SESSION ENGINE ================= */

let session=null;
let mistakes=[];
let timerHandle=null;
let progress=loadProgress();

// Practice mode: "normal" or "weak"
let practiceMode="normal";
const WEAK_THRESHOLD_DEFAULT=0.99;
const WEAK_MIN_ATTEMPTS_DEFAULT=8;

function readStorageJson(key){
  try { return JSON.parse(localStorage.getItem(key) || "null"); } catch { return null; }
}

function normalizeAlphabetItemId(value){
  return String(value || "").replace(/^alpha\./, "");
}

function validateAlphabetHandoff(handoff){
  if(!handoff || typeof handoff!=="object") return null;
  if(handoff.contract_version!=="kals.recommendation.v1") return null;
  if(handoff.action!=="start_practice_session") return null;
  if(handoff.target_app!=="alphabet") return null;
  if(handoff.target_mode!=="recognition") return null;
  if(!handoff.app_request || handoff.app_request.app!=="alphabet") return null;
  if(!Number.isInteger(handoff.session_size) || handoff.session_size<=0) return null;
  const recommendedIds=Array.isArray(handoff.app_request.recommended_item_ids)
    ? handoff.app_request.recommended_item_ids.map(normalizeAlphabetItemId).filter(Boolean)
    : [];
  return {
    ...handoff,
    app_request:{
      ...handoff.app_request,
      recommended_item_ids:recommendedIds
    }
  };
}

function getPendingAlphabetHandoff(){
  return validateAlphabetHandoff(readStorageJson(PENDING_HANDOFF_KEY));
}

function clearPendingAlphabetHandoff(){
  localStorage.removeItem(PENDING_HANDOFF_KEY);
}

function buildGuidedAlphabetDeck(basePool, size, handoff){
  const byId=new Map(basePool.map(card=>[card.id, card]));
  const seen=new Set();
  const guided=[];
  (handoff.app_request.recommended_item_ids || []).forEach(id=>{
    if(seen.has(id)) return;
    const card=byId.get(id);
    if(!card) return;
    seen.add(id);
    guided.push(card);
  });
  if(guided.length>=size) return guided.slice(0,size);
  const filler=shuffle(basePool.filter(card=>!seen.has(card.id))).slice(0, Math.max(0, size-guided.length));
  return [...guided, ...filler];
}

function getWeakCards(basePool, threshold=WEAK_THRESHOLD_DEFAULT, minAttempts=WEAK_MIN_ATTEMPTS_DEFAULT){
  const stats=(progress && progress.letterStats) ? progress.letterStats : {};
  return basePool.filter(l=>{
    const s=stats[l.kn];
    const attempts=s ? (s.attempts||0) : 0;
    const correct=s ? (s.correct||0) : 0;
    if(attempts < minAttempts) return false;
    const acc = attempts>0 ? (correct/attempts) : 0;
    return acc < threshold;
  });
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}

function buildOptions(card,pool){
let others=shuffle(pool.filter(l=>l.kn!==card.kn));
let selected=[card,...others.slice(0,3)];
return shuffle(selected).map(x=>x.dev);
}

function startSession(){
  const banner=document.getElementById("modeBanner");
  if(practiceMode==="weak") banner.classList.remove("hidden");
  else banner.classList.add("hidden");
  show("settings");
}

function renderAgentHandoffPanel(){
  const handoff=getPendingAlphabetHandoff();
  const panel=document.getElementById("agentHandoffPanel");
  if(!handoff){
    panel.classList.add("hidden");
    document.getElementById("agentHandoffItems").innerHTML="";
    return;
  }

  panel.classList.remove("hidden");
  document.getElementById("agentHandoffMessage").textContent=
    handoff.ui_message || `Open alphabet for a ${handoff.session_size}-card recommended session.`;
  document.getElementById("agentHandoffMeta").textContent=
    `${handoff.selection_reason || "Agent guidance available"} · ${handoff.session_size} cards`;
  const focusItems=Array.isArray(handoff.focus_items) ? handoff.focus_items.slice(0,6) : [];
  document.getElementById("agentHandoffItems").innerHTML=focusItems.length
    ? focusItems.map(item=>`
      <span class="kn inline-flex items-center rounded-full bg-white px-3 py-1 text-sm font-semibold text-emerald-800 border border-emerald-200">
        ${item.shown_value}
      </span>
    `).join("")
    : '<span class="text-xs text-slate-500">No specific focus items attached.</span>';
}

document.getElementById("startBtn").onclick=()=>{ practiceMode="normal"; startSession(); };

document.getElementById("weakBtn").onclick=()=>{ practiceMode="weak"; startSession(); };
document.getElementById("viewStatsBtn").onclick=()=>{
renderStats();
show("stats");
};
document.getElementById("guidedStartBtn").onclick=()=>{
  const handoff=getPendingAlphabetHandoff();
  if(!handoff){
    renderAgentHandoffPanel();
    return;
  }
  beginConfiguredSession({ handoff });
};
document.getElementById("dismissGuidedBtn").onclick=()=>{
  clearPendingAlphabetHandoff();
  renderAgentHandoffPanel();
};

function beginConfiguredSession(options={}){
const handoff=validateAlphabetHandoff(options.handoff || null);
const subset=handoff ? "all" : document.querySelector('input[name="subset"]:checked').value;
const countSelect=handoff ? String(handoff.session_size) : document.getElementById("cardCount").value;
const timer=Number(document.getElementById("timerSelect").value);

let basePool=LETTERS;
if(subset==="vowel") basePool=basePool.filter(l=>l.group==="vowel");
if(subset==="consonant") basePool=basePool.filter(l=>l.group!=="vowel");

let cardPool=basePool;
if(!handoff && practiceMode==="weak"){
  const weakCards=getWeakCards(basePool);
  if(weakCards.length===0){
    alert("No weak letters found yet (needs a bit more history). Try a normal session first, or lower the threshold in code defaults.");
    return;
  }
  cardPool=weakCards;
}

let cards;
if(handoff){
  cards=buildGuidedAlphabetDeck(basePool, Math.min(handoff.session_size, basePool.length), handoff);
}else if(countSelect==="full") cards=shuffle(cardPool);
else cards=shuffle(cardPool).slice(0,Number(countSelect));

session={
subset,
cards,
timer,
index:0,
score:0,
startTime:Date.now(),
mode:handoff ? "guided" : practiceMode,
pool:basePool,
handoff
};

mistakes=[];
document.getElementById("cardTotal").textContent=cards.length;
document.getElementById("score").textContent=0;
if(handoff) clearPendingAlphabetHandoff();

KJT.startSession();
show("play");
nextCard();
}

document.getElementById("beginSession").onclick=()=>{ beginConfiguredSession(); };

// ── KJT: capture card shown time ──────────────────────────────────────────
let _kjtCardShownAt = 0;
// ─────────────────────────────────────────────────────────────────────────

function nextCard(){
if(session.index>=session.cards.length){
endSession();
return;
}
renderCard();
runTimer();
}

function renderCard(){
const card=session.cards[session.index];
document.getElementById("prompt").textContent=card.kn;
document.getElementById("cardIndex").textContent=session.index+1;
document.getElementById("progressBar").style.width=
  Math.round(((session.index)/session.cards.length)*100)+"%";

const options=buildOptions(card,session.pool);
const box=document.getElementById("options");
box.innerHTML="";

options.forEach(opt=>{
const btn=document.createElement("button");
btn.className="w-full border px-4 py-3 rounded-xl hover:bg-slate-50";
btn.textContent=opt;
btn.onclick=()=>selectOption(opt);
box.appendChild(btn);
});

// ── KJT: record when this card was shown ──────────────────────────────────
_kjtCardShownAt = performance.now();
// ─────────────────────────────────────────────────────────────────────────
}

function selectOption(value){
clearInterval(timerHandle);
const card=session.cards[session.index];
const correct=card.dev;
const buttons=document.querySelectorAll("#options button");

const isCorrect = value === correct;

// ── KJT: record attempt ───────────────────────────────────────────────────
const allOptions = Array.from(buttons).map(b => b.textContent);
KJT.recordAttempt({
  item_id:        'alpha.' + card.id,
  item_type:      'akshara',
  shown_value:    card.kn,
  correct_answer: correct,
  user_answer:    value,
  choices_presented: allOptions,
  result:         isCorrect ? 'pass' : 'fail',
  response_time_ms: Math.round(performance.now() - _kjtCardShownAt),
  distractor_mode: null,
  difficulty:     null,
  intervention_id: session?.handoff?.handoff_id || null
});
// ─────────────────────────────────────────────────────────────────────────

buttons.forEach(b=>{
  b.disabled=true;
  if(b.textContent===correct)
    b.classList.add("bg-green-500","text-white");
  else if(b.textContent===value && !isCorrect)
    b.classList.add("bg-rose-500","text-white");
  else
    b.classList.add("opacity-60");
});

if(!isCorrect){
  const wrongBtn=Array.from(buttons).find(b=>b.textContent===value);
  if(wrongBtn){
    wrongBtn.classList.remove("bg-rose-500","text-white");
    let blinks=0;
    const blink=setInterval(()=>{
      wrongBtn.classList.toggle("bg-rose-500");
      wrongBtn.classList.toggle("text-white");
      blinks++;
      if(blinks>=6){ clearInterval(blink); wrongBtn.classList.add("bg-rose-500","text-white"); }
    },120);
  }
}

updateLetterStats(card,isCorrect);
if(isCorrect) session.score++;
else mistakes.push(card);

document.getElementById("score").textContent=session.score;

setTimeout(()=>{
  session.index++;
  nextCard();
},1400);
}

function runTimer(){
if(!session.timer) return;
let t=session.timer;
document.getElementById("timerRing").setAttribute("data-time",t+"s");
timerHandle=setInterval(()=>{
t--;
document.getElementById("timerRing").setAttribute("data-time",t+"s");
if(t<=0){
clearInterval(timerHandle);

// ── KJT: timeout = fail with no user answer ───────────────────────────────
const card=session.cards[session.index];
const buttons=document.querySelectorAll("#options button");
const allOptions = Array.from(buttons).map(b => b.textContent);
KJT.recordAttempt({
  item_id:        'alpha.' + card.id,
  item_type:      'akshara',
  shown_value:    card.kn,
  correct_answer: card.dev,
  user_answer:    null,
  choices_presented: allOptions,
  result:         'fail',
  response_time_ms: Math.round(session.timer * 1000),
  distractor_mode: null,
  difficulty:     null,
  intervention_id: session?.handoff?.handoff_id || null
});
// ─────────────────────────────────────────────────────────────────────────

mistakes.push(session.cards[session.index]);
session.index++;
nextCard();
}
},1200);
}

function updateLetterStats(card,correct){
if(!progress.letterStats[card.kn]){
progress.letterStats[card.kn]={attempts:0,correct:0};
}
progress.letterStats[card.kn].attempts++;
if(correct) progress.letterStats[card.kn].correct++;
}

function endSession(){
show("end");
const total=session.cards.length;
const accuracy=Math.round((session.score/total)*100);
document.getElementById("scoreText").textContent=
`${session.score}/${total} • ${accuracy}%`;

if(mistakes.length===0){
document.getElementById("perfectBox").classList.remove("hidden");
document.getElementById("mistakeSection").classList.add("hidden");
}else{
document.getElementById("perfectBox").classList.add("hidden");
document.getElementById("mistakeSection").classList.remove("hidden");
const list=document.getElementById("mistakeList");
list.innerHTML="";
mistakes.forEach(m=>{
let li=document.createElement("li");
li.textContent=m.kn+" → "+m.dev;
list.appendChild(li);
});
}

recordSession(total,accuracy);
saveProgress(progress);
renderDashboard();
renderAgentHandoffPanel();
}

function recordSession(total,accuracy){
progress.totalSessions++;
progress.totalCorrect+=session.score;
progress.totalAttempts+=total;

if(accuracy===100){
progress.currentStreak++;
if(progress.currentStreak>progress.bestStreak)
progress.bestStreak=progress.currentStreak;
}else{
progress.currentStreak=0;
}

progress.sessions.unshift({
date:new Date().toISOString(),
accuracy,
total,
score:session.score
});

if(progress.sessions.length>20)
progress.sessions=progress.sessions.slice(0,20);
}

document.getElementById("retryBtn").onclick=()=>{
session.cards=[...mistakes];
session.index=0;
session.score=0;
mistakes=[];
show("play");
nextCard();
};

/* ================= DASHBOARD ================= */

function renderDashboard(){
const avg=progress.totalAttempts>0?
Math.round((progress.totalCorrect/progress.totalAttempts)*100):0;

document.getElementById("quickStats").innerHTML=`
<div class="bg-slate-100 rounded-xl p-4">
<div class="text-2xl font-bold">${progress.totalSessions}</div>
<div class="text-sm text-slate-600">Sessions</div>
</div>
<div class="bg-slate-100 rounded-xl p-4">
<div class="text-2xl font-bold">${avg}%</div>
<div class="text-sm text-slate-600">Avg Accuracy</div>
</div>

`;

}

function formatSessionDate(isoString){
  const d=new Date(isoString);
  const now=new Date();
  const diffDays=Math.floor((now-d)/(1000*60*60*24));
  if(diffDays===0) return "Today";
  if(diffDays===1) return "Yesterday";
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function renderStats(){
  const avg=progress.totalAttempts>0?
    Math.round((progress.totalCorrect/progress.totalAttempts)*100):0;

  document.getElementById("overallStats").innerHTML=`
    <h3 class="font-semibold mb-3">Overview</h3>
    <div class="grid grid-cols-3 gap-4 text-center">
      <div class="bg-slate-100 rounded-xl p-4">
        <div class="text-2xl font-bold">${progress.totalSessions}</div>
        <div class="text-sm text-slate-600">Sessions</div>
      </div>
      <div class="bg-slate-100 rounded-xl p-4">
        <div class="text-2xl font-bold">${avg}%</div>
        <div class="text-sm text-slate-600">Avg Accuracy</div>
      </div>
      <div class="bg-slate-100 rounded-xl p-4">
        <div class="text-2xl font-bold">${progress.bestStreak}</div>
        <div class="text-sm text-slate-600">Best Streak</div>
      </div>
    </div>`;

  const recentSessions=progress.sessions.slice(0,5);
  document.getElementById("recentHistory").innerHTML=`
    <h3 class="font-semibold mb-3">Recent Sessions</h3>
    <div class="space-y-2">
      ${recentSessions.length===0
        ? `<p class="text-slate-400 text-sm">No sessions yet</p>`
        : recentSessions.map(s=>`
        <div class="flex items-center justify-between bg-slate-50 rounded-xl px-4 py-3">
          <div class="text-sm text-slate-500">${formatSessionDate(s.date)}</div>
          <div class="font-semibold">${s.score}/${s.total}</div>
          <div class="text-sm ${s.accuracy===100?'text-green-600':'text-slate-600'}">${s.accuracy}%</div>
        </div>`).join("")}
    </div>`;

  const letterStats=progress.letterStats;
  const weakLetters=Object.keys(letterStats)
    .map(l=>({
      kn:l,
      acc:Math.round((letterStats[l].correct/letterStats[l].attempts)*100),
      attempts:letterStats[l].attempts
    }))
    .filter(l=>l.acc<99)
    .sort((a,b)=>a.acc-b.acc)
    .slice(0,10);

  document.getElementById("letterStats").innerHTML=`
    <h3 class="font-semibold mb-3">Letters to Work On</h3>
    ${weakLetters.length===0
      ? `<p class="text-slate-400 text-sm">No weak letters yet — keep practicing!</p>`
      : `<div class="space-y-2">
        ${weakLetters.map(l=>`
        <div class="flex items-center justify-between bg-slate-50 rounded-xl px-4 py-3">
          <div class="kn text-2xl font-bold">${l.kn}</div>
          <div class="text-sm text-slate-500">${l.attempts} attempts</div>
          <div class="font-semibold text-rose-600">${l.acc}%</div>
        </div>`).join("")}
      </div>`}`;
}
document.getElementById("resetLetterStatsBtn").onclick=()=>{
  if(confirm("Reset all letter accuracy data? Session history will be kept.")){
    progress.letterStats={};
    saveProgress(progress);
    renderStats();
  }
};
renderDashboard();


/* =================================================================================
   KJT TELEMETRY MODULE v1.0
   Shared across all KALS apps. Drop this block in unchanged.
   Writes to localStorage key: kjt_events (append-only JSON array)
   Schema version: 1.0 (matches KALS Project Charter v1.1)
   ================================================================================= */
const KJT = (() => {

  const STORAGE_KEY  = 'kjt_events';
  const APP          = 'alphabet';
  const APP_VERSION  = '1.0';
  const INACTIVITY_MS = 20 * 60 * 1000; // 20 minutes

  let _sessionId      = null;
  let _inactivityTimer = null;

  // ── Utilities ──────────────────────────────────────────────────────────────

  function _uuid() {
    // Prefer crypto.randomUUID if available, fall back to math random
    if (typeof crypto !== 'undefined' && crypto.randomUUID) {
      return crypto.randomUUID();
    }
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function _isoNow() {
    return new Date().toISOString();
  }

  function _readEvents() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch {
      return [];
    }
  }

  function _writeEvents(events) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    } catch (e) {
      console.warn('[KJT] localStorage write failed:', e);
    }
  }

  // ── Inactivity reset ───────────────────────────────────────────────────────
  // If 20 mins pass with no attempt, the session is considered ended.
  // On next attempt, a new session_id is generated automatically.

  function _resetInactivityTimer() {
    if (_inactivityTimer) clearTimeout(_inactivityTimer);
    _inactivityTimer = setTimeout(() => {
      console.info('[KJT] Session ended due to inactivity.');
      _sessionId = null;
    }, INACTIVITY_MS);
  }

  // ── Public API ─────────────────────────────────────────────────────────────

  function startSession() {
    // Generate fresh session_id on explicit session start.
    // sessionStorage ensures tab close = new session.
    _sessionId = _uuid();
    try {
      sessionStorage.setItem('kjt_session_id', _sessionId);
    } catch {}
    _resetInactivityTimer();
    console.info('[KJT] Session started:', _sessionId);
  }

  function recordAttempt(fields) {
    // If no active session (e.g. inactivity expired), start a new one silently.
    if (!_sessionId) {
      startSession();
    }
    _resetInactivityTimer();

    const event = {
      session_id:         _sessionId,
      app:                APP,
      app_version:        APP_VERSION,
      item_id:            fields.item_id,
      item_type:          fields.item_type,
      shown_value:        fields.shown_value,
      correct_answer:     fields.correct_answer,
      user_answer:        fields.user_answer        ?? null,
      choices_presented:  fields.choices_presented  ?? null,
      result:             fields.result,
      response_time_ms:   fields.response_time_ms,
      timestamp:          _isoNow(),
      mode:               'recognition',
      distractor_mode:    fields.distractor_mode    ?? null,
      difficulty:         fields.difficulty         ?? null,
      intervention_id:    fields.intervention_id    ?? null,
    };

    const events = _readEvents();
    events.push(event);
    _writeEvents(events);
  }

  function getEvents() {
    return _readEvents();
  }

  function clearEvents() {
    localStorage.removeItem(STORAGE_KEY);
  }

  return { startSession, recordAttempt, getEvents, clearEvents };

})();
/* ================= END KJT TELEMETRY MODULE ================= */


</script>
</body>
